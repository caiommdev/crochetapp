version: '3.8'
services:
  postgres:
    image: postgres:13
    container_name: crochet_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=crochetdb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: